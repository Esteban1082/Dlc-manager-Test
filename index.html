<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoreLine — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;0,900;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:      #0a0a08;
    --surface: #141410;
    --border:  #252520;
    --text:    #f0ede4;
    --muted:   #6a6a5e;
    --amber:   #e8a045;
    --amber2:  #f5c060;
    --red:     #ff4040;
    --green:   #4cdb8a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Fond animé */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(232,160,69,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,160,69,.03) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridDrift 20s linear infinite;
  }
  @keyframes gridDrift { from { transform: translateY(0); } to { transform: translateY(48px); } }

  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,160,69,.06) 0%, transparent 70%);
    top: -200px; left: -200px;
    z-index: 0;
    animation: glowPulse 4s ease-in-out infinite;
  }
  @keyframes glowPulse { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.1)} }

  .card {
    position: relative; z-index: 1;
    width: 100%; max-width: 400px;
    padding: 40px 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 32px 64px rgba(0,0,0,.5), 0 0 0 1px rgba(232,160,69,.05);
    animation: cardIn .4s cubic-bezier(0.16, 1, 0.3, 1);
    margin: 20px;
  }
  @keyframes cardIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

  .logo { text-align: center; margin-bottom: 32px; }
  .logo-icon {
    width: 56px; height: 56px; margin: 0 auto 14px;
    background: linear-gradient(135deg, var(--amber), var(--amber2));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 8px 24px rgba(232,160,69,.3);
  }
  .logo-name {
    font-family: 'Fraunces', serif;
    font-size: 28px; font-weight: 900;
    color: var(--amber);
    letter-spacing: -0.5px;
  }
  .logo-sub {
    font-size: 11px; color: var(--muted);
    letter-spacing: 2px; text-transform: uppercase;
    margin-top: 4px;
  }

  .tenant-badge {
    display: flex; align-items: center; gap: 8px;
    background: rgba(232,160,69,.08);
    border: 1px solid rgba(232,160,69,.2);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 24px;
    font-size: 12px; color: var(--amber2);
  }
  .tenant-badge-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    flex-shrink: 0;
  }

  label {
    display: block;
    font-size: 10px; color: var(--muted);
    letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    margin-bottom: 16px;
  }
  input:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 3px rgba(232,160,69,.1);
  }
  input::placeholder { color: var(--muted); }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: var(--amber);
    border: none; border-radius: 10px;
    font-family: 'Fraunces', serif;
    font-size: 16px; font-weight: 700;
    color: #000;
    cursor: pointer;
    transition: all .15s;
    margin-top: 4px;
    position: relative; overflow: hidden;
  }
  .btn-login:hover { background: var(--amber2); transform: translateY(-1px); box-shadow: 0 8px 20px rgba(232,160,69,.3); }
  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }

  .btn-loading::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent);
    animation: shimmer 1s infinite;
  }
  @keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }

  .error-msg {
    display: none;
    background: rgba(255,64,64,.1);
    border: 1px solid rgba(255,64,64,.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px; color: var(--red);
    margin-bottom: 16px;
    animation: shake .3s ease;
  }
  @keyframes shake { 0%,100%{transform:none} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  .forgot-link {
    display: block; text-align: center;
    font-size: 11px; color: var(--muted);
    margin-top: 16px; cursor: pointer;
    text-decoration: none;
    transition: color .15s;
  }
  .forgot-link:hover { color: var(--amber); }

  .version { position: fixed; bottom: 16px; left: 0; right: 0; text-align: center; font-size: 10px; color: var(--border); letter-spacing: 1px; }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="glow"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">▦</div>
    <div class="logo-name">StoreLine</div>
    <div class="logo-sub">Gestion de rayon</div>
  </div>

  <div class="tenant-badge" id="tenant-badge" style="display:none">
    <div class="tenant-badge-dot"></div>
    <span id="tenant-name">Chargement...</span>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <label for="email">Email</label>
  <input id="email" type="email" placeholder="prenom@robthemarket.be" autocomplete="email">

  <label for="password">Mot de passe</label>
  <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"
    onkeydown="if(event.key==='Enter') login()">

  <button class="btn-login" id="btn-login" onclick="login()">
    Se connecter →
  </button>

  <a class="forgot-link" onclick="forgotPassword()">Mot de passe oublié ?</a>
</div>

<div class="version">StoreLine v1.0 · 16/03/2026</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL  = 'https://jeqptodorjzeyhapbmrz.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplcXB0b2Rvcmp6ZXloYXBibXJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjI0ODksImV4cCI6MjA4OTIzODQ4OX0.j4JqeDnDMEghnBtKy5Knpb4QYDFEXiRtDeq7SSz3zWk';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.animation = 'none';
  requestAnimationFrame(() => el.style.animation = '');
}

function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-login');

  if (!email || !password) { showError('Remplis les deux champs.'); return; }

  hideError();
  btn.disabled = true;
  btn.textContent = 'Connexion…';
  btn.classList.add('btn-loading');

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    btn.disabled = false;
    btn.textContent = 'Se connecter →';
    btn.classList.remove('btn-loading');
    if (error.message.includes('Invalid login')) showError('Email ou mot de passe incorrect.');
    else if (error.message.includes('Email not confirmed')) showError('Confirme d\'abord ton email.');
    else showError(error.message);
    return;
  }

  // Charger le profil pour savoir où rediriger
  const { data: profile } = await sb
    .from('profiles')
    .select('role, tenant_id')
    .eq('id', data.user.id)
    .single();

  // Stocker en localStorage pour les modules
  localStorage.setItem('sl_auth', '1');
  localStorage.setItem('sl_user', JSON.stringify({
    id:       data.user.id,
    email:    data.user.email,
    role:     profile?.role || 'employe',
    tenant_id: profile?.tenant_id,
  }));

  btn.textContent = '✓ Connecté !';

  // Redirection selon le rôle
  setTimeout(() => {
    if (profile?.role === 'superadmin' || profile?.role === 'admin') {
      window.location.href = 'admin.html';
    } else {
      window.location.href = 'index.html';
    }
  }, 600);
}

async function forgotPassword() {
  const email = document.getElementById('email').value.trim();
  if (!email) { showError('Entre ton email d\'abord.'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html'
  });
  if (error) showError(error.message);
  else {
    hideError();
    const el = document.getElementById('error-msg');
    el.style.background = 'rgba(76,219,138,.1)';
    el.style.borderColor = 'rgba(76,219,138,.3)';
    el.style.color = 'var(--green)';
    el.textContent = '✓ Email de réinitialisation envoyé.';
    el.style.display = 'block';
  }
}

// Gérer le token d'invitation/reset dans l'URL (évite la boucle infinie)
async function checkSession() {
  const hash = window.location.hash;
  const params = new URLSearchParams(window.location.search);

  // Si l'URL contient un token de type invitation ou recovery → ne pas rediriger
  // Laisser Supabase le traiter via onAuthStateChange
  if (hash.includes('access_token') || hash.includes('type=invite') || hash.includes('type=recovery')) {
    // Supabase va traiter le token automatiquement
    // On attend l'événement auth pour rediriger
    return;
  }

  // Vérifier si déjà connecté
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    await redirectByRole(session.user.id);
  }
}

async function redirectByRole(userId) {
  const { data: profile } = await sb
    .from('profiles')
    .select('role')
    .eq('id', userId)
    .single();
  const role = profile?.role || 'employe';
  localStorage.setItem('sl_auth', '1');
  if (role === 'superadmin' || role === 'admin') {
    window.location.href = 'admin.html';
  } else {
    window.location.href = 'index.html';
  }
}

// Écouter les changements d'auth (gère les tokens d'invitation)
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session) {
    // Stocker les infos
    const { data: profile } = await sb
      .from('profiles')
      .select('role, tenant_id')
      .eq('id', session.user.id)
      .single();
    localStorage.setItem('sl_auth', '1');
    localStorage.setItem('sl_user', JSON.stringify({
      id:        session.user.id,
      email:     session.user.email,
      role:      profile?.role || 'employe',
      tenant_id: profile?.tenant_id,
    }));
    // Nettoyer le hash de l'URL avant de rediriger
    history.replaceState(null, '', window.location.pathname);
    await redirectByRole(session.user.id);
  }
  if (event === 'PASSWORD_RECOVERY') {
    // Afficher le formulaire de nouveau mot de passe
    showPasswordRecovery();
  }
});

function showPasswordRecovery() {
  document.querySelector('.card').innerHTML = `
    <div class="logo">
      <div class="logo-icon">▦</div>
      <div class="logo-name">StoreLine</div>
      <div class="logo-sub">Nouveau mot de passe</div>
    </div>
    <label for="new-pwd">Nouveau mot de passe</label>
    <input id="new-pwd" type="password" placeholder="••••••••" class="form-input" style="margin-bottom:16px">
    <button class="btn-login" onclick="updatePassword()">Enregistrer →</button>
  `;
}

async function updatePassword() {
  const pwd = document.getElementById('new-pwd')?.value;
  if (!pwd || pwd.length < 6) { showError('Mot de passe trop court (6 caractères min)'); return; }
  const { error } = await sb.auth.updateUser({ password: pwd });
  if (error) showError(error.message);
  else {
    localStorage.setItem('sl_auth', '1');
    window.location.href = 'admin.html';
  }
}

checkSession();
</script>
</body>
</html>
