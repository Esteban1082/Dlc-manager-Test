<script>
document.documentElement.style.visibility = 'hidden';
window.__guardPassed = undefined;
(async () => {
  const pm  = localStorage.getItem('pm_auth') === '1';
  const sl  = localStorage.getItem('sl_auth') === '1';
  const tok = localStorage.getItem('sl_access_token');
  function block(title, sub) {
    window.__guardPassed = false;
    const render = () => {
      if (!document.body) { requestAnimationFrame(render); return; }
      document.documentElement.style.visibility = 'visible';
      document.body.innerHTML = `<div style="position:fixed;inset:0;background:#0f0f0d;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;text-align:center;padding:20px"><div><div style="font-size:48px;margin-bottom:16px">🚫</div><div style="font-family:'Fraunces',serif;font-size:22px;font-weight:900;color:#e8a045;margin-bottom:8px">${title}</div><div style="font-size:13px;color:#7a7a6e;margin-bottom:24px">${sub}</div><a href="index.html" style="padding:14px 28px;background:#e8a045;border-radius:12px;font-family:'Fraunces',serif;font-size:16px;font-weight:700;color:#000;text-decoration:none">← Retour au hub</a></div></div>`;
    };
    render();
  }
  function allow() { window.__guardPassed = true; document.documentElement.style.visibility = 'visible'; }
  if (!pm && !sl) { block('Accès restreint', 'Connecte-toi depuis le hub'); return; }
  if (tok && sl) {
    const user = JSON.parse(localStorage.getItem('sl_user') || '{}');
    if (['superadmin','admin'].includes(user.role)) { allow(); return; }
    if (!user.id) { allow(); return; }
    try {
      const r = await fetch('https://jeqptodorjzeyhapbmrz.supabase.co/rest/v1/permissions?user_id=eq.'+user.id+'&module=eq.commandes&actif=eq.true&select=id',
        {headers:{'apikey':'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImplcXB0b2Rvcmp6ZXloYXBibXJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjI0ODksImV4cCI6MjA4OTIzODQ4OX0.j4JqeDnDMEghnBtKy5Knpb4QYDFEXiRtDeq7SSz3zWk','Authorization':'Bearer '+tok}});
      const perms = await r.json();
      if (!Array.isArray(perms)||perms.length===0){block('Module non activé',"Parle à Esteban pour obtenir l'accès");return;}
      allow();
    } catch(e){allow();}
    return;
  }
  allow();
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commandes — StoreLine</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;0,900;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:#0f0f0d; --surface:#1a1a16; --surface2:#222218;
    --border:#2e2e28; --border2:#3a3a32;
    --text:#f0ede4; --muted:#7a7a6e;
    --amber:#e8a045; --amber2:#f5c060;
    --red:#ff4040; --green:#4cdb8a; --blue:#4db8ff;
  }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; }
  button { cursor:pointer; transition:all .15s; font-family:'DM Mono',monospace; }

  header { display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100; }
  .logo-title { font-family:'Fraunces',serif;font-weight:900;font-size:20px;color:var(--amber); }
  .logo-sub   { font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px; }
  .back-btn { padding:7px 14px;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;text-decoration:none;transition:all .15s; }
  .back-btn:hover { border-color:var(--amber);color:var(--text); }

  .content { padding:20px;max-width:860px;margin:0 auto 80px; }

  /* Tabs historique / nouvelle */
  .main-tabs { display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px; }
  .main-tab { padding:11px 20px;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none; }
  .main-tab.active { color:var(--amber);border-bottom-color:var(--amber); }

  /* Fournisseur bar */
  .fourn-bar { display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap; }
  .fourn-select { flex:1;min-width:200px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;appearance:none;cursor:pointer; }
  .fourn-select:focus { border-color:var(--amber); }

  .btn { padding:11px 18px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap; }
  .btn-primary { background:var(--amber);color:#000; }
  .btn-primary:hover { background:var(--amber2); }
  .btn-ghost { background:transparent;border:1px solid var(--border);color:var(--muted); }
  .btn-ghost:hover { border-color:var(--amber);color:var(--text); }
  .btn-green { background:var(--green);color:#000; }
  .btn-red   { background:transparent;border:1px solid rgba(255,64,64,.3);color:var(--red); }
  .btn-red:hover { background:rgba(255,64,64,.1); }

  /* Commande card */
  .commande-card { background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden; }
  .commande-header { padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap; }
  .fourn-name    { font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--amber); }
  .fourn-contact { font-size:11px;color:var(--muted);margin-top:4px;line-height:1.6; }

  .date-bar { display:flex;gap:8px;padding:14px 20px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none; }
  .date-bar::-webkit-scrollbar { display:none; }
  .day-btn { padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;white-space:nowrap;transition:all .15s;font-family:'DM Mono',monospace; }
  .day-btn.active { background:var(--amber);color:#000;border-color:var(--amber);font-weight:700; }
  .day-btn:hover:not(.active) { border-color:var(--amber);color:var(--text); }

  .produits-section { padding:0 20px 16px; }
  .categorie-title { font-family:'Fraunces',serif;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:14px 0 8px;border-bottom:1px solid var(--border);margin-bottom:4px; }
  .produit-row { display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border); }
  .produit-row:last-child { border-bottom:none; }
  .produit-nom { flex:1;font-size:13px; }
  .qty-btns { display:flex;gap:4px; }
  .qty-btn { width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center; }
  .qty-btn:hover { border-color:var(--amber);color:var(--amber); }
  .qty-input { width:68px;padding:8px 10px;text-align:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-weight:600;outline:none;transition:border-color .15s;font-family:'DM Mono',monospace; }
  .qty-input:focus { border-color:var(--amber); }
  .qty-input:not([value=""])[value] { border-color:rgba(232,160,69,.4);background:rgba(232,160,69,.05); }

  .note-section { padding:0 20px 16px; }
  .form-label { font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;display:block; }
  .note-input { width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;outline:none;resize:none;transition:border-color .15s;min-height:70px;font-family:'DM Mono',monospace; }
  .note-input:focus { border-color:var(--amber); }

  .actions-bar { display:flex;gap:8px;padding:14px 20px;border-top:1px solid var(--border);flex-wrap:wrap; }

  /* Historique */
  .histo-card { background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s; }
  .histo-card:hover { border-color:var(--border2); }
  .histo-header { display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap; }
  .histo-fourn { font-family:'Fraunces',serif;font-size:14px;font-weight:700; }
  .histo-date  { font-size:11px;color:var(--muted); }
  .histo-badge { padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(76,219,138,.1);color:var(--green);border:1px solid rgba(76,219,138,.3); }
  .histo-detail { margin-top:10px;display:none;border-top:1px solid var(--border);padding-top:10px; }
  .histo-detail.open { display:block; }
  .histo-table { width:100%;border-collapse:collapse;font-size:11px; }
  .histo-table th { text-align:left;color:var(--muted);padding:4px 8px;border-bottom:1px solid var(--border); }
  .histo-table td { padding:5px 8px;border-bottom:1px solid var(--border); }
  .histo-table tr:last-child td { border-bottom:none; }

  /* Modal */
  .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:500;align-items:flex-end;justify-content:center; }
  .modal { background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:24px 20px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto; }
  .modal-title { font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--amber);margin-bottom:18px; }
  .form-input { width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s;margin-bottom:10px;font-family:'DM Mono',monospace; }
  .form-input:focus { border-color:var(--amber); }

  /* Print */
  @media print {
    body * { visibility:hidden; }
    #print-zone, #print-zone * { visibility:visible; }
    #print-zone { position:fixed;inset:0;background:#fff;color:#000;padding:20px;font-family:'Courier New',monospace;font-size:11px; }
    .no-print { display:none!important; }
  }

  .toast-container { position:fixed;bottom:24px;right:16px;z-index:700;display:flex;flex-direction:column;gap:8px; }
  .toast { background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:12px;animation:slideIn .2s ease;max-width:280px; }
  @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:none;opacity:1} }
  .version-tag { position:fixed;bottom:10px;left:14px;font-size:10px;color:var(--border);z-index:50; }
  .empty { text-align:center;padding:40px 20px;color:var(--muted); }

  @media(max-width:520px) { .qty-btns { display:none; } .produit-nom { font-size:12px; } }
</style>
</head>

<script>
const LS = 'pm_cmd_';
const JOURS = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

function lsGet(k,d){ try{const v=localStorage.getItem(LS+k);return v?JSON.parse(v):d;}catch(e){return d;} }
function lsSet(k,v){ try{localStorage.setItem(LS+k,JSON.stringify(v));}catch(e){} }

// ── État ──
let fournisseurs = lsGet('fournisseurs',[]);
let historique   = lsGet('historique',[]);
let rtm          = lsGet('rtm',{nom:'Rob The Market · Pâtisserie',adresse:'28, bd. De la Woluwe — 1150 Bruxelles',tel:'02/761 01 74',email:'patisserie@robthemarket.be'});
let fournActuel  = null;
let jourActuel   = '';
let qtes         = {}; // {key: {jour: qty}}
let editFournIdx = null;
let settingsTab  = 'rtm';

// ── Toast ──
function toast(msg, err=false){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');t.className='toast';
  t.style.borderColor=err?'var(--red)':'var(--green)';t.textContent=msg;
  c.appendChild(t);setTimeout(()=>t.remove(),3500);
}

// ── Sections ──
function showSection(name, el){
  document.getElementById('section-nouvelle').style.display = name==='nouvelle'?'block':'none';
  document.getElementById('section-historique').style.display = name==='historique'?'block':'none';
  document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
  if(name==='historique') renderHistorique();
}

// ── Init ──
function init(){
  buildFournSelect();
  remplirRTMFields();
  renderJoursBtn('new-fourn-jours',[]);
}

// ── RTM ──
function remplirRTMFields(){
  document.getElementById('rtm-nom').value     = rtm.nom || '';
  document.getElementById('rtm-adresse').value = rtm.adresse || '';
  document.getElementById('rtm-tel').value     = rtm.tel || '';
  document.getElementById('rtm-email').value   = rtm.email || '';
  document.getElementById('rtm-mini').textContent = rtm.nom + (rtm.tel ? ' · '+rtm.tel : '');
}
function saveRTM(){
  rtm = {
    nom:     document.getElementById('rtm-nom').value.trim(),
    adresse: document.getElementById('rtm-adresse').value.trim(),
    tel:     document.getElementById('rtm-tel').value.trim(),
    email:   document.getElementById('rtm-email').value.trim(),
  };
  lsSet('rtm', rtm);
  remplirRTMFields();
  toast('✓ Infos sauvegardées');
}

function onFournChange(){

function nouvelleCommande(){
  if(!fournActuel) return;
  qtes={}; jourActuel='';
  document.getElementById('note-commande').value='';
  document.getElementById('fourn-title').textContent=fournActuel.nom;

function buildDateBar(){
  const jours=fournActuel.jours||JOURS;
  document.getElementById('date-bar').innerHTML=jours.map(j=>
    `<button class="day-btn" onclick="selectJour('${j}')">${j}</button>`
  ).join('');
  selectJour(jours[0]);
}

function selectJour(j){
  jourActuel=j;
  const today=new Date();
  const map={Lundi:1,Mardi:2,Mercredi:3,Jeudi:4,Vendredi:5,Samedi:6,Dimanche:0};
  const diff=(map[j]-today.getDay()+7)%7||7;
  const tgt=new Date(today); tgt.setDate(today.getDate()+diff);
  document.getElementById('date-label').textContent=
    j+' '+tgt.toLocaleDateString('fr-BE',{day:'numeric',month:'long',year:'numeric'});
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.toggle('active',b.textContent===j));
  renderProduitsForm();
}

function renderProduitsForm(){
  const sec=document.getElementById('produits-section');
  if(!fournActuel||!sec) return;
  const produits=fournActuel.produits||[];
  if(!produits.length){
    sec.innerHTML='<div class="empty">📦 Aucun produit.<br><small>Ajoute des produits via ⚙ → Fournisseurs → Produits</small></div>';
    return;
  }
  const cats={};
  produits.forEach((p,i)=>{const c=p.categorie||'Produits';if(!cats[c])cats[c]=[];cats[c].push({...p,idx:i});});
  sec.innerHTML=Object.entries(cats).map(([cat,prods])=>`
    <div class="categorie-title">${cat}</div>
    ${prods.map(p=>{
      const key=`${fournActuel.idx}_${p.idx}`;
      const qty=(qtes[key]||{})[jourActuel]||0;
      return `<div class="produit-row">
        <div class="produit-nom">${p.nom}</div>
        <div class="qty-btns">
          <button class="qty-btn" onclick="adj('${key}',-1)">−</button>
          <button class="qty-btn" onclick="adj('${key}',1)">＋</button>
        </div>
        <input class="qty-input" type="number" min="0" value="${qty||''}" placeholder="0"
          id="qty_${key}" oninput="setQ('${key}',this.value)" onclick="this.select()">
      </div>`;
    }).join('')}`).join('');
}

function adj(key,d){
  const inp=document.getElementById('qty_'+key);
  const v=Math.max(0,(parseInt(inp.value)||0)+d);
  inp.value=v||'';setQ(key,v);
}
function setQ(key,val){
  if(!qtes[key])qtes[key]={};
  const v=parseInt(val)||0;
  if(v>0) qtes[key][jourActuel]=v; else delete qtes[key][jourActuel];
}
function resetCommande(){ qtes={};jourActuel='';document.getElementById('commande-wrap').style.display='none'; }

// ── Génération texte commande ──
function buildCommandeText(){
  if(!fournActuel) return '';
  const produits=fournActuel.produits||[];
  const note=document.getElementById('note-commande').value.trim();
  const today=new Date().toLocaleDateString('fr-BE',{day:'numeric',month:'long',year:'numeric'});

  // Jours qui ont au moins une quantité
  const joursActifs=(fournActuel.jours||JOURS).filter(j=>
    produits.some((_,i)=>(qtes[`${fournActuel.idx}_${i}`]||{})[j]>0)
  );

  let txt='';
  txt+=`COMMANDE AU FOURNISSEUR : ${fournActuel.nom.toUpperCase()}\n`;
  txt+='═'.repeat(55)+'\n\n';
  txt+=`De       : ${rtm.nom}\n`;
  if(rtm.adresse) txt+=`Adresse  : ${rtm.adresse}\n`;
  if(rtm.tel)     txt+=`Tél.     : ${rtm.tel}\n`;
  txt+=`Date     : ${today}\n\n`;

  if(!joursActifs.length){ txt+='\nAucune quantité saisie.\n'; return txt; }

  // En-tête colonnes
  txt+='DÉSIGNATION'.padEnd(34);
  joursActifs.forEach(j=>txt+=j.substring(0,10).padEnd(12));
  txt+='\n'+'─'.repeat(34+joursActifs.length*12)+'\n';

  const cats={};
  produits.forEach((p,i)=>{const c=p.categorie||'Produits';if(!cats[c])cats[c]=[];cats[c].push({...p,idx:i});});

  Object.entries(cats).forEach(([cat,prods])=>{
    const lignes=prods.filter(p=>joursActifs.some(j=>(qtes[`${fournActuel.idx}_${p.idx}`]||{})[j]>0));
    if(!lignes.length) return;
    txt+=`\n${cat.toUpperCase()}\n`;
    lignes.forEach(p=>{
      txt+=p.nom.substring(0,33).padEnd(34);
      joursActifs.forEach(j=>{
        const q=(qtes[`${fournActuel.idx}_${p.idx}`]||{})[j]||0;
        txt+=(q>0?String(q):'').padEnd(12);
      });
      txt+='\n';
    });
  });

  if(note) txt+=`\nNOTE : ${note}\n`;
  txt+='\n'+'─'.repeat(55)+'\n';
  txt+=`${rtm.nom}\n`;
  if(rtm.adresse) txt+=`${rtm.adresse}\n`;
  if(rtm.tel)     txt+=`Tél. : ${rtm.tel}\n`;
  return txt;
}

function buildHTMLTable(){
  const produits=fournActuel.produits||[];
  const joursActifs=(fournActuel.jours||JOURS).filter(j=>
    produits.some((_,i)=>(qtes[`${fournActuel.idx}_${i}`]||{})[j]>0)
  );
  if(!joursActifs.length) return '<p>Aucune quantité saisie.</p>';

  const cats={};
  produits.forEach((p,i)=>{const c=p.categorie||'Produits';if(!cats[c])cats[c]=[];cats[c].push({...p,idx:i});});

  let html=`<table class="print-table">
    <thead><tr><th style="width:55%">DÉSIGNATION</th>${joursActifs.map(j=>`<th>${j}</th>`).join('')}</tr></thead>
    <tbody>`;

  Object.entries(cats).forEach(([cat,prods])=>{
    const lignes=prods.filter(p=>joursActifs.some(j=>(qtes[`${fournActuel.idx}_${p.idx}`]||{})[j]>0));
    if(!lignes.length) return;
    html+=`<tr><td colspan="${1+joursActifs.length}" class="print-cat">${cat}</td></tr>`;
    lignes.forEach(p=>{
      html+=`<tr><td>${p.nom}</td>`;
      joursActifs.forEach(j=>{
        const q=(qtes[`${fournActuel.idx}_${p.idx}`]||{})[j]||0;
        html+=`<td style="text-align:center;font-weight:${q>0?'bold':'normal'}">${q>0?q:''}</td>`;
      });
      html+='</tr>';
    });
  });

  html+='</tbody></table>';
  return html;
}

// ── Historique ──
function sauvegarderHistorique(){
  const produits=fournActuel.produits||[];
  const commande={
    id:Date.now(),
    fourn:fournActuel.nom,
    fourIdx:fournActuel.idx,
    date:new Date().toISOString(),
    note:document.getElementById('note-commande').value.trim(),
    qtes:JSON.parse(JSON.stringify(qtes)),
    produits:JSON.parse(JSON.stringify(produits)),
  };
  historique.unshift(commande);
  if(historique.length>50) historique=historique.slice(0,50);
  lsSet('historique',historique);
  renderHistorique();
  toast('✓ Commande sauvegardée dans l\'historique');
}

function renderHistorique(){
  const el=document.getElementById('historique-list');
  if(!el) return;
  if(!historique.length){
    el.innerHTML='<div class="empty">📋 Aucune commande pour l\'instant.</div>';
    return;
  }
  el.innerHTML=historique.slice(0,30).map((c,i)=>{
    const date=new Date(c.date).toLocaleDateString('fr-BE',{day:'numeric',month:'short',year:'numeric'});
    const heure=new Date(c.date).toLocaleTimeString('fr-BE',{hour:'2-digit',minute:'2-digit'});
    // Calcul lignes avec quantité
    const lignes=Object.values(c.qtes||{}).flatMap(j=>Object.values(j)).filter(q=>q>0);
    const totalQty=lignes.reduce((s,q)=>s+q,0);
    return `
    <div class="histo-card" onclick="toggleHisto(${i})">
      <div class="histo-header">
        <div>
          <div class="histo-fourn">${c.fourn}</div>
          <div class="histo-date">${date} à ${heure}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:11px;color:var(--muted)">${totalQty} unité${totalQty>1?'s':''}</span>
          <span class="histo-badge">✓ Envoyée</span>
        </div>
      </div>
      <div class="histo-detail" id="histo-${i}">
        ${buildHistoDetail(c)}
        ${c.note?`<div style="margin-top:8px;padding:8px;background:var(--bg);border-radius:8px;font-size:11px;color:var(--muted)">📝 ${c.note}</div>`:''}
        <div style="margin-top:8px;display:flex;gap:8px">
          <button class="btn btn-ghost" onclick="reimprimerCommande(${i});event.stopPropagation()" style="padding:6px 14px;font-size:11px">🖨 Ré-imprimer</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function buildHistoDetail(c){
  const produits=c.produits||[];
  const joursActifs=JOURS.filter(j=>produits.some((_,pi)=>(c.qtes?.[`${c.fourIdx}_${pi}`]||{})[j]>0));
  if(!joursActifs.length) return '';

  const cats={};
  produits.forEach((p,i)=>{const cat=p.categorie||'Produits';if(!cats[cat])cats[cat]=[];cats[cat].push({...p,idx:i});});

  let html=`<table class="histo-table">
    <thead><tr><th>Désignation</th>${joursActifs.map(j=>`<th>${j}</th>`).join('')}</tr></thead>
    <tbody>`;

  Object.entries(cats).forEach(([cat,prods])=>{
    const lignes=prods.filter(p=>joursActifs.some(j=>(c.qtes?.[`${c.fourIdx}_${p.idx}`]||{})[j]>0));
    if(!lignes.length) return;
    html+=`<tr><td colspan="${1+joursActifs.length}" style="color:var(--muted);font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase">${cat}</td></tr>`;
    lignes.forEach(p=>{
      html+=`<tr><td>${p.nom}</td>`;
      joursActifs.forEach(j=>{
        const q=(c.qtes?.[`${c.fourIdx}_${p.idx}`]||{})[j]||0;
        html+=`<td style="text-align:center;color:${q>0?'var(--amber)':'var(--border)'}">${q>0?q:'—'}</td>`;
      });
      html+='</tr>';
    });
  });
  html+='</tbody></table>';
  return html;
}

function toggleHisto(i){
  const el=document.getElementById('histo-'+i);
  if(el) el.classList.toggle('open');
}

function reimprimerCommande(i){
  const c=historique[i];
  fournActuel={...fournisseurs[c.fourIdx]||{nom:c.fourn,produits:c.produits||[]},idx:c.fourIdx,produits:c.produits||[]};
  qtes=c.qtes||{};
  document.getElementById('note-commande').value=c.note||'';
  genererPDF();
}

function renderJoursBtn(containerId, selectedJours){

function toggleJourBtn(btn,j){

}

function closeModal(id){ document.getElementById(id).style.display='none'; }

// ── Start ──
function _runWhenReady(){
  if(window.__guardPassed===true){init();}
  else if(window.__guardPassed===false){}
  else{setTimeout(_runWhenReady,50);}
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',_runWhenReady);}
else{_runWhenReady();}
</script>
