<title>Données — StoreLine</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;0,900;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:      #0f0f0d;
    --surface: #1a1a16;
    --surface2:#222218;
    --border:  #2e2e28;
    --border2: #3a3a32;
    --text:    #f0ede4;
    --muted:   #7a7a6e;
    --amber:   #e8a045;
    --amber2:  #f5c060;
    --red:     #ff4040;
    --green:   #4cdb8a;
    --blue:    #4db8ff;
  }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; display:flex; flex-direction:column; }

  /* ── Header ── */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bg); z-index:100; flex-shrink:0;
  }
  .logo-title { font-family:'Fraunces',serif; font-weight:900; font-size:20px; color:var(--amber); }
  .logo-sub   { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:2px; }
  .back-btn {
    padding:7px 14px; border:1px solid var(--border);
    border-radius:8px; color:var(--muted); font-family:'DM Mono',monospace;
    font-size:12px; text-decoration:none; transition:all .15s;
  }
  .back-btn:hover { border-color:var(--amber); color:var(--text); }

  /* ── Tabs ── */
  .tabs-bar {
    display:flex; gap:0; overflow-x:auto;
    border-bottom:1px solid var(--border);
    background:var(--surface); flex-shrink:0;
    scrollbar-width:none;
  }
  .tabs-bar::-webkit-scrollbar { display:none; }
  .tab {
    padding:12px 20px; font-size:12px; color:var(--muted);
    border-bottom:2px solid transparent; white-space:nowrap;
    cursor:pointer; transition:all .15s; border-top:none; border-left:none; border-right:none;
    background:none;
  }
  .tab.active { color:var(--amber); border-bottom-color:var(--amber); }
  .tab:hover:not(.active) { color:var(--text); }

  /* ── Toolbar ── */
  .toolbar {
    display:flex; align-items:center; gap:8px;
    padding:10px 16px; border-bottom:1px solid var(--border);
    background:var(--surface); flex-wrap:wrap; flex-shrink:0;
  }
  .toolbar-search {
    flex:1; min-width:160px; padding:8px 12px;
    background:var(--bg); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-size:12px;
    outline:none; transition:border-color .15s;
  }
  .toolbar-search:focus { border-color:var(--amber); }
  .btn-sm {
    padding:7px 14px; border-radius:8px; border:none;
    font-family:'DM Mono',monospace; font-size:11px; font-weight:600;
    cursor:pointer; transition:all .15s; white-space:nowrap;
  }
  .btn-ghost-sm { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .btn-ghost-sm:hover { border-color:var(--amber); color:var(--text); }
  .btn-amber-sm { background:var(--amber); color:#000; }
  .btn-amber-sm:hover { background:var(--amber2); }
  .btn-green-sm { background:var(--green); color:#000; }

  /* ── Status bar ── */
  .status-bar {
    padding:6px 16px; background:var(--surface);
    border-bottom:1px solid var(--border);
    font-size:10px; color:var(--muted);
    display:flex; align-items:center; gap:12px; flex-shrink:0;
  }
  .status-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 4px var(--green); }

  /* ── Table ── */
  .table-wrap {
    flex:1; overflow:auto; position:relative;
  }
  table {
    width:100%; border-collapse:collapse; font-size:12px;
    min-width:600px;
  }
  thead th {
    position:sticky; top:0; z-index:10;
    background:var(--surface2); padding:10px 14px;
    text-align:left; font-size:10px; color:var(--muted);
    letter-spacing:1px; text-transform:uppercase;
    border-bottom:2px solid var(--border); white-space:nowrap;
    cursor:pointer; user-select:none;
  }
  thead th:hover { color:var(--text); }
  thead th.sorted-asc::after  { content:' ↑'; color:var(--amber); }
  thead th.sorted-desc::after { content:' ↓'; color:var(--amber); }

  tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }
  tbody tr:hover { background:rgba(232,160,69,.04); }
  tbody tr.editing { background:rgba(232,160,69,.06); }

  td {
    padding:0; vertical-align:middle;
    max-width:240px;
  }
  .cell-view {
    padding:10px 14px; min-height:36px;
    display:block; cursor:pointer;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .cell-view:hover { color:var(--amber); }
  .cell-input {
    width:100%; padding:9px 14px; background:rgba(232,160,69,.08);
    border:none; border-bottom:2px solid var(--amber);
    color:var(--text); font-family:'DM Mono',monospace; font-size:12px;
    outline:none; min-height:36px;
  }

  /* Cellules spéciales */
  .cell-badge {
    display:inline-flex; padding:3px 8px; border-radius:20px;
    font-size:10px; font-weight:700;
  }
  .badge-red    { background:rgba(255,64,64,.15);   color:var(--red);   border:1px solid rgba(255,64,64,.3); }
  .badge-orange { background:rgba(232,160,69,.15);  color:var(--amber); border:1px solid rgba(232,160,69,.3); }
  .badge-green  { background:rgba(76,219,138,.15);  color:var(--green); border:1px solid rgba(76,219,138,.3); }
  .badge-muted  { background:rgba(122,122,110,.15); color:var(--muted); border:1px solid var(--border); }

  td.col-actions { width:60px; text-align:center; }
  .del-btn {
    padding:4px 8px; background:transparent;
    border:1px solid rgba(255,64,64,.2); border-radius:6px;
    color:var(--red); font-size:11px; cursor:pointer;
    opacity:0; transition:opacity .15s;
  }
  tbody tr:hover .del-btn { opacity:1; }
  .del-btn:hover { background:rgba(255,64,64,.1); }

  /* ── Loading / Empty ── */
  .loading-row td { text-align:center; padding:40px; color:var(--muted); }
  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-ico { font-size:40px; margin-bottom:12px; }


  /* ── Modals ── */
  .modal-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.8); backdrop-filter:blur(4px);
    z-index:600; align-items:center; justify-content:center; padding:16px;
  }
  .modal {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:24px 20px;
    width:100%; max-width:680px; max-height:90vh; overflow-y:auto;
  }
  .modal-title { font-family:'Fraunces',serif; font-size:18px; font-weight:700; color:var(--amber); margin-bottom:18px; }
  /* ── Toast ── */
  .toast-container { position:fixed; bottom:24px; right:16px; z-index:700; display:flex; flex-direction:column; gap:8px; }
  .toast {
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:12px 16px; font-size:12px;
    animation:slideIn .2s ease; max-width:280px;
  }
  @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:none;opacity:1} }


  .form-label-m { font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;display:block; }
  .form-input-m { width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;outline:none;font-family:'DM Mono',monospace; }
  .form-input-m:focus { border-color:var(--amber); }
  .version-tag { position:fixed; bottom:10px; left:14px; font-size:10px; color:var(--border); z-index:50; }

  @media(max-width:600px) {
    .toolbar-search { min-width:100px; }
  }
</style>
</head>

<script>
// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
const API_URL = "https://script.google.com/macros/s/AKfycbz425iBOjYC8raof6W44y0IcJlCZHzjOrMzzjw0ju8uXFCKvFSl-xmYi9tZvOoSvP0aZg/exec";
let _apiCallId = 0;

// Définition des onglets : colonnes, mapping API, tri par défaut
const TABS = {
  produits: {
    label: 'Produits',
    action: 'getProducts',
    parseData: d => d.success && d.products ? d.products : [],
    cols: [
      { key:'nom_article',  label:'Nom',         editable:false },
      { key:'patissier',    label:'Patissier',   editable:false },
      { key:'code_barres',  label:'Code-barres', editable:false },
      { key:'categorie',    label:'Catégorie',   editable:false },
    ],
    sortKey: 'nom_article',
  },
  pertes: {
    label: 'Pertes',
    action: 'getPertes',
    parseData: d => d.success && d.pertes ? d.pertes : (Array.isArray(d) ? d : []),
    cols: [
      { key:'name',      label:'Article',    editable:false },
      { key:'brand',     label:'Patissier',  editable:false },
      { key:'quantity',  label:'Quantité',   editable:false },
      { key:'barcode',   label:'Code-barres',editable:false },
      { key:'date',      label:'Date',       editable:false, type:'date' },
    ],
    sortKey: 'date',
    sortDir: 'desc',
  },
  temperatures: {
    label: 'Températures',
    action: 'getTemperatures',
    parseData: d => d.success && d.temperatures ? d.temperatures : (Array.isArray(d) ? d : []),
    cols: [
      { key:'nom',   label:'Zone',       editable:false },
      { key:'temp',  label:'Temp. (°C)', editable:false },
      { key:'date',  label:'Date',       editable:false, type:'date' },
    ],
    sortKey: 'date',
    sortDir: 'desc',
  },
  allergenes: {
    label: 'Allergènes',
    action: 'getAllergenes',
    parseData: d => {
      // getAllergenes retourne un tableau d'objets avec .nom et .allergenes (liste)
      if (d.success && Array.isArray(d.fiches)) return d.fiches;
      if (d.success && Array.isArray(d.allergenes)) return d.allergenes;
      if (Array.isArray(d)) return d;
      // Essayer de récupérer depuis d directement
      const keys = Object.keys(d).filter(k => k !== 'success' && k !== 'error');
      for (const k of keys) { if (Array.isArray(d[k])) return d[k]; }
      return [];
    },
    cols: [
      { key:'nom',        label:'Gâteau',    editable:false },
      { key:'patissier',  label:'Patissier', editable:false },
      { key:'gluten',     label:'Gluten',    editable:false, type:'allergen' },
      { key:'lait',       label:'Lait',      editable:false, type:'allergen' },
      { key:'oeufs',      label:'Œufs',      editable:false, type:'allergen' },
      { key:'fruits_coq', label:'Fr. coq.',  editable:false, type:'allergen' },
      { key:'arachides',  label:'Arachides', editable:false, type:'allergen' },
    ],
    sortKey: 'nom',
  },
  transferts: {
    label: 'Transferts',
    action: 'getTransferts',
    parseData: d => d.success && d.transferts ? d.transferts : (Array.isArray(d) ? d : []),
    cols: [
      { key:'date',       label:'Date',       editable:false, type:'date'         },
      { key:'rayon',      label:'Rayon',      editable:false                      },
      { key:'bonBarcode', label:'N° bon',     editable:false                      },
      { key:'total',      label:'Prix (€)',   editable:false, type:'price_smart'  },
      { key:'articles',   label:'Articles',   editable:false, type:'articles_count'},
      { key:'note',       label:'Note',       editable:false                      },
    ],
    sortKey: 'date',
    sortDir: 'desc',
  },
};

// ══════════════════════════════════════
// ÉTAT
// ══════════════════════════════════════
let currentTab   = 'produits';
let allData      = {};  // cache par tab
let filteredData = [];
let sortKey      = '';
let sortDir      = 'asc';
let pendingEdits = {}; // { rowIdx: { key: newVal } }

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
function toast(msg, isError=false) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.borderColor = isError ? 'var(--red)' : 'var(--green)';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function setStatus(msg, syncing=false) {
  document.getElementById('status-text').textContent = msg;
  document.getElementById('status-dot').style.background = syncing ? 'var(--amber)' : 'var(--green)';
  document.getElementById('status-dot').style.boxShadow  = syncing ? '0 0 4px var(--amber)' : '0 0 4px var(--green)';
}

function api(params) {
  return new Promise((resolve, reject) => {
    const cbName = 'dlcCb_' + (++_apiCallId);
    const timeout = setTimeout(() => {
      delete window[cbName];
      reject(new Error('Timeout'));
    }, 15000);
    window[cbName] = (data) => {
      clearTimeout(timeout);
      delete window[cbName];
      resolve(data);
    };
    const p = new URLSearchParams({ ...params, callback: cbName });
    const script = document.createElement('script');
    script.onerror = () => { clearTimeout(timeout); delete window[cbName]; reject(new Error('Erreur réseau')); };
    script.src = API_URL + '?' + p.toString();
    document.head.appendChild(script);
    setTimeout(() => { try { document.head.removeChild(script); } catch(e){} }, 20000);
  });
}

// ══════════════════════════════════════
// TABS
// ══════════════════════════════════════
function switchTab(tabId, el) {
  currentTab = tabId;
  pendingEdits = {};
  document.getElementById('btn-save').style.display = 'none';
  document.getElementById('btn-rapport').style.display = tabId === 'pertes' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('search-input').value = '';
  const cfg = TABS[tabId];
  sortKey = cfg.sortKey || '';
  sortDir = cfg.sortDir || 'asc';
  if (allData[tabId]) {
    renderTable(allData[tabId]);
  } else {
    loadTab(tabId);
  }
}

async function loadTab(tabId) {
  const cfg = TABS[tabId];
  setStatus('Chargement...', true);
  renderLoading();
  try {
    const data = await api({ action: cfg.action });
    const rows = cfg.parseData ? cfg.parseData(data) : (data.data || data.items || []);
    console.log('[donnees] tab:', tabId, '→', rows.length, 'lignes', rows[0] || '');
    if (tabId === 'allergenes' && rows.length === 0) console.log('[donnees] allergenes raw:', JSON.stringify(data).substring(0, 300));
    allData[tabId] = rows;
    renderTable(rows);
    setStatus(`${rows.length} ligne${rows.length>1?'s':''} chargée${rows.length>1?'s':''}`);
  } catch(e) {
    setStatus('⚠ Erreur de chargement', false);
    renderError(e.message);
    toast('⚠ Impossible de charger les données', true);
  }
}

async function syncData() {
  allData[currentTab] = null;
  await loadTab(currentTab);
  toast('✓ Données rechargées');
}

// ══════════════════════════════════════
// RENDU TABLE
// ══════════════════════════════════════
function renderLoading() {
  const cfg = TABS[currentTab];
  document.getElementById('table-head').innerHTML = `<tr>${cfg.cols.map(c=>`<th>${c.label}</th>`).join('')}<th></th></tr>`;
  document.getElementById('table-body').innerHTML = `<tr class="loading-row"><td colspan="${cfg.cols.length+1}">⏳ Chargement...</td></tr>`;
  document.getElementById('row-count').textContent = '';
}

function renderError(msg) {
  const cfg = TABS[currentTab];
  document.getElementById('table-body').innerHTML = `<tr class="loading-row"><td colspan="${cfg.cols.length+1}" style="color:var(--red)">⚠ ${msg}</td></tr>`;
}

function renderTable(rows) {
  const cfg = TABS[currentTab];
  const search = document.getElementById('search-input').value.toLowerCase();

  // Filtrer
  filteredData = rows.filter(row =>
    !search || cfg.cols.some(c => String(row[c.key]||'').toLowerCase().includes(search))
  );

  // Trier
  if (sortKey) {
    filteredData.sort((a,b) => {
      const va = String(a[sortKey]||'').toLowerCase();
      const vb = String(b[sortKey]||'').toLowerCase();
      return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }

  // Header
  document.getElementById('table-head').innerHTML = `<tr>
    ${cfg.cols.map(c => `
      <th onclick="sortBy('${c.key}')" class="${sortKey===c.key ? 'sorted-'+sortDir : ''}">
        ${c.label}
      </th>`).join('')}
    <th></th>
  </tr>`;

  // Body
  if (!filteredData.length) {
    document.getElementById('table-body').innerHTML = `
      <tr><td colspan="${cfg.cols.length+1}">
        <div class="empty-state"><div class="empty-ico">🔍</div><div>Aucun résultat</div></div>
      </td></tr>`;
  } else {
    document.getElementById('table-body').innerHTML = filteredData.map((row, i) =>
      `<tr id="row-${i}">${cfg.cols.map(c => renderCell(row, i, c)).join('')}
       <td class="col-actions">
         ${currentTab === 'transferts' ? `<button class="view-btn" onclick="voirTicket(${i})" title="Voir le ticket">👁</button>` : ''}
         <button class="del-btn" onclick="confirmDelete(${i})" title="Supprimer">✕</button>
       </td>
      </tr>`
    ).join('');
  }

  document.getElementById('row-count').textContent = `${filteredData.length} / ${rows.length} lignes`;
}

function renderCell(row, rowIdx, col) {
  const val = row[col.key] ?? '';
  const edited = pendingEdits[rowIdx]?.[col.key];
  const displayVal = edited !== undefined ? edited : val;

  if (col.type === 'badge') {
    const isHors = displayVal === true || displayVal === 'true' || displayVal === 'Hors norme';
    return `<td><span class="cell-view"><span class="cell-badge ${isHors?'badge-red':'badge-green'}">${isHors?'⚠ Hors norme':'✓ Normal'}</span></span></td>`;
  }
  if (col.type === 'allergen') {
    const cls = displayVal==='oui' ? 'badge-red' : displayVal==='non' ? 'badge-green' : 'badge-muted';
    const txt = displayVal==='oui' ? '✓' : displayVal==='non' ? '✗' : '?';
    return `<td><span class="cell-view" style="text-align:center;display:block"><span class="cell-badge ${cls}">${txt}</span></span></td>`;
  }
  if (col.type === 'price') {
    const price = parseFloat(displayVal) || 0;
    return `<td><span class="cell-view" style="color:var(--amber)">${price.toLocaleString('fr-BE',{style:'currency',currency:'EUR'})}</span></td>`;
  }
  if (col.type === 'price_from_articles') {
    let total = 0;
    try {
      const articles = JSON.parse(row.articles || '[]');
      total = articles.reduce((s, a) => s + (parseFloat(a.prix || a.price || 0) * (parseInt(a.qty || a.quantity || 1))), 0);
    } catch(e) {}
    if (!total) total = parseFloat(row.total || row.prix_total || 0);
    const fmt = total > 0 ? total.toLocaleString('fr-BE',{style:'currency',currency:'EUR'}) : '—';
    return `<td><span class="cell-view" style="color:${total>0?'var(--amber)':'var(--muted)'}">${fmt}</span></td>`;
  }
  if (col.type === 'price_smart') {
    // Essayer toutes les clés possibles pour le prix
    let total = parseFloat(row.total || row.prix_total || row.price || row.prix || 0);
    // Si toujours 0 ou NaN, décoder depuis le barcode du bon (format Rob The Market)
    if (!total && row.bonBarcode) {
      const stripped = String(row.bonBarcode).slice(0, -1).slice(-7);
      const c = parseInt(stripped, 10);
      if (!isNaN(c) && c > 0) total = c / 100;
    }
    const fmt = total > 0 ? total.toLocaleString('fr-BE',{style:'currency',currency:'EUR'}) : '—';
    return `<td><span class="cell-view" style="color:${total>0?'var(--amber)':'var(--muted)'}">${fmt}</span></td>`;
  }
  if (col.type === 'articles_count') {
    try {
      const articles = JSON.parse(row.articles || '[]');
      const noms = articles.map(a => `${a.nom||a.name||'?'} ×${a.qty||a.quantity||1}`).join(', ');
      return `<td><span class="cell-view" style="color:var(--muted);max-width:200px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${noms}">${articles.length} article${articles.length>1?'s':''} — ${noms}</span></td>`;
    } catch(e) {
      return `<td><span class="cell-view" style="color:var(--muted)">—</span></td>`;
    }
  }
  if (col.type === 'date') {
    try {
      const d = new Date(displayVal);
      if (!isNaN(d)) return `<td><span class="cell-view" style="color:var(--muted)">${d.toLocaleDateString('fr-BE')}</span></td>`;
    } catch(e){}
    return `<td><span class="cell-view" style="color:var(--muted)">${displayVal}</span></td>`;
  }
  if (!col.editable) {
    return `<td><span class="cell-view">${displayVal}</span></td>`;
  }
  // Cellule éditable
  const hasPending = edited !== undefined;
  return `<td style="${hasPending?'border-left:2px solid var(--amber)':''}">
    <span class="cell-view" id="cv-${rowIdx}-${col.key}"
      onclick="editCell(${rowIdx},'${col.key}','${String(displayVal).replace(/'/g,"\\'")}',this)"
      title="Cliquer pour modifier">${displayVal || '<span style="color:var(--border)">—</span>'}</span>
  </td>`;
}

function editCell(rowIdx, key, currentVal, span) {
  // Si déjà en édition
  if (document.getElementById(`input-${rowIdx}-${key}`)) return;

  const input = document.createElement('input');
  input.className = 'cell-input';
  input.id = `input-${rowIdx}-${key}`;
  input.value = currentVal === '—' ? '' : currentVal;
  input.style.width = Math.max(span.parentElement.offsetWidth, 120) + 'px';

  span.style.display = 'none';
  span.parentElement.parentElement.insertBefore(
    Object.assign(document.createElement('td'), {
      // workaround — replace cell content
    }), span.parentElement
  );

  span.parentElement.appendChild(input);
  input.focus();
  input.select();

  input.addEventListener('blur', () => commitEdit(rowIdx, key, input.value, span, input));
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { input.remove(); span.style.display = ''; }
  });

  document.getElementById('row-'+rowIdx)?.classList.add('editing');
}

function commitEdit(rowIdx, key, newVal, span, input) {
  const cfg = TABS[currentTab];
  const col = cfg.cols.find(c => c.key === key);
  const originalVal = filteredData[rowIdx]?.[key] ?? '';

  input.remove();
  span.style.display = '';
  document.getElementById('row-'+rowIdx)?.classList.remove('editing');

  if (String(newVal) === String(originalVal)) return; // pas de changement

  if (!pendingEdits[rowIdx]) pendingEdits[rowIdx] = {};
  pendingEdits[rowIdx][key] = newVal;

  // Mettre à jour l'affichage
  span.textContent = newVal || '';
  span.parentElement.style.borderLeft = '2px solid var(--amber)';

  document.getElementById('btn-save').style.display = 'block';
  toast(`✏ Modification en attente — clique "Sauvegarder"`, false);
}

// ══════════════════════════════════════
// TRI & FILTRE
// ══════════════════════════════════════
function sortBy(key) {
  if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortKey = key; sortDir = 'asc'; }
  renderTable(allData[currentTab] || []);
}

function applyFilter() {
  renderTable(allData[currentTab] || []);
}

// ══════════════════════════════════════
// SAUVEGARDE
// ══════════════════════════════════════
async function saveChanges() {
  const editCount = Object.keys(pendingEdits).length;
  if (!editCount) { toast('Aucune modification à sauvegarder'); return; }

  const cfg = TABS[currentTab];
  if (!cfg.saveAction) {
    toast('⚠ Sauvegarde non disponible pour cet onglet (disponible en P2 avec Supabase)', true);
    return;
  }

  setStatus('Sauvegarde...', true);
  let saved = 0;
  for (const [rowIdx, changes] of Object.entries(pendingEdits)) {
    const row = filteredData[rowIdx];
    const updated = { ...row, ...changes };
    try {
      await api({ action: cfg.saveAction, ...updated });
      Object.assign(filteredData[rowIdx], changes);
      if (allData[currentTab]) Object.assign(allData[currentTab].find(r => r === row) || {}, changes);
      saved++;
    } catch(e) {
      toast(`⚠ Erreur ligne ${parseInt(rowIdx)+1}: ${e.message}`, true);
    }
  }

  pendingEdits = {};
  document.getElementById('btn-save').style.display = 'none';
  setStatus(`${saved} modification${saved>1?'s':''} sauvegardée${saved>1?'s':''}`);
  toast(`✓ ${saved} modification${saved>1?'s':''} sauvegardée${saved>1?'s':''}`);
  renderTable(allData[currentTab] || []);
}

// ══════════════════════════════════════
// EXPORT CSV
// ══════════════════════════════════════
function exportCSV() {
  const cfg = TABS[currentTab];
  const rows = filteredData.length ? filteredData : (allData[currentTab] || []);
  if (!rows.length) { toast('⚠ Aucune donnée à exporter', true); return; }

  let headers, lines;

  if (currentTab === 'transferts') {
    // Export transferts enrichi : date, rayon, bonBarcode, prix total, articles détaillés
    headers = ['Date','Rayon','Code bon (bonBarcode)','Barcode articles','Prix total (€)','Articles','Note'];
    lines = [
      headers.join(';'),
      ...rows.map(r => {
        const total = parseFloat(r.total || r.prix_total || 0);
        let articles = [];
        try { articles = JSON.parse(r.articles || '[]'); } catch(e) {}
        const articlesStr = articles.map(a => `${a.nom||a.name||'?'} x${a.qty||1}`).join(' | ');
        const barcodesStr = articles.map(a => a.barcode || '').filter(Boolean).join(' | ');
        return [
          `"${r.date || ''}"`,
          `"${r.rayon || ''}"`,
          `"${r.bonBarcode || r.bon_barcode || ''}"`,
          `"${barcodesStr}"`,
          total > 0 ? total.toFixed(2).replace('.',',') : '',
          `"${articlesStr}"`,
          `"${(r.note || '').replace(/"/g, '')}"`
        ].join(';');
      })
    ];
  } else {
    // Export standard avec ajout code-barres si disponible
    const extraCols = currentTab === 'pertes' ? [] : [];
    headers = cfg.cols.map(c => c.label);
    lines = [
      headers.join(';'),
      ...rows.map(r => cfg.cols.map(c => {
        const v = r[c.key] ?? '';
        const escaped = String(v).replace(/"/g, '""'); return `"${escaped}"`;  
    ];
  }

  const blob = new Blob(['\ufeff' + lines.join('\n')], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `storeline_${currentTab}_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`✓ ${rows.length} lignes exportées`);
}

// RAPPORT DE PERTES
// ══════════════════════════════════════
let rapportData = [];

function openRapport() {
  // Pré-remplir les dates (mois courant)
  const now = new Date();
  const debut = new Date(now.getFullYear(), now.getMonth(), 1);
  document.getElementById('rapport-debut').value = debut.toISOString().split('T')[0];
  document.getElementById('rapport-fin').value   = now.toISOString().split('T')[0];
  document.getElementById('rapport-result').style.display = 'none';
  document.getElementById('modal-rapport').style.display = 'flex';
}

function genererRapport() {
  const debut = document.getElementById('rapport-debut').value;
  const fin   = document.getElementById('rapport-fin').value;
  if (!debut || !fin) { toast('⚠ Choisis les deux dates', true); return; }

  const pertes = allData['pertes'] || [];
  if (!pertes.length) { toast('⚠ Charge dabord onglet Pertes', true); return; }

  const dDebut = new Date(debut);
  const dFin   = new Date(fin); dFin.setHours(23,59,59);

  // Filtrer par période
  const filtered = pertes.filter(p => {
    const d = new Date(p.date);
    return d >= dDebut && d <= dFin;
  });

  if (!filtered.length) {
    toast('Aucune perte sur cette période', true);
    return;
  }

  // Regrouper par article (name + brand)
  const groups = {};
  filtered.forEach(p => {
    const key = (p.name || '?') + '||' + (p.brand || '');
    if (!groups[key]) groups[key] = { name: p.name || '?', brand: p.brand || '—', barcode: p.barcode || '', qty: 0, count: 0 };
    groups[key].qty     += parseInt(p.quantity) || 1;
    groups[key].count   += 1;
    if (!groups[key].barcode && p.barcode) groups[key].barcode = p.barcode;
  });

  // Trier par quantité totale desc
  rapportData = Object.values(groups).sort((a,b) => b.qty - a.qty);

  const totalQty   = rapportData.reduce((s,r) => s + r.qty, 0);
  const totalLines = filtered.length;

  // Afficher
  const debutFmt = new Date(debut).toLocaleDateString('fr-BE', {day:'numeric',month:'long',year:'numeric'});
  const finFmt   = new Date(fin).toLocaleDateString('fr-BE',   {day:'numeric',month:'long',year:'numeric'});
  document.getElementById('rapport-titre').textContent =
    `${rapportData.length} article(s) · ${debutFmt} → ${finFmt}`;

  document.getElementById('rapport-tbody').innerHTML = rapportData.map(r => `
    <tr style="border-bottom:1px solid var(--border)">
      <td style="padding:9px 14px">${r.name}</td>
      <td style="padding:9px 14px;color:var(--muted)">${r.brand}</td>
      <td style="padding:9px 14px;color:var(--muted);font-size:11px">${r.barcode || '—'}</td>
      <td style="padding:9px 14px;text-align:right;color:var(--amber);font-weight:700">${r.qty}</td>
      <td style="padding:9px 14px;text-align:right;color:var(--muted)">${r.count}×</td>
    </tr>`).join('');

  document.getElementById('rapport-total').textContent =
    `Total : ${totalQty} unité${totalQty>1?'s':''} perdues sur ${totalLines} entrée${totalLines>1?'s':''}`;

  document.getElementById('rapport-result').style.display = 'block';
}

function exportRapportCSV() {
  if (!rapportData.length) return;
  const debut = document.getElementById('rapport-debut').value;
  const fin   = document.getElementById('rapport-fin').value;
  const lines = [
    'Article;Patissier;Code-barres;Quantite totale;Occurrences',
    ...rapportData.map(r => `"${r.name}";"${r.brand}";"${r.barcode || ''}";${r.qty};${r.count}`)
  ];
  const blob = new Blob(['\ufeff' + lines.join('\n')], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `rapport_pertes_${debut}_${fin}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`✓ ${rapportData.length} articles exportés`);
}

function init() {
  const cfg = TABS[currentTab];
  sortKey = cfg.sortKey || '';
  sortDir = cfg.sortDir || 'asc';
  loadTab(currentTab);
